<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#0A0A0F"/>
  <circle cx="100" cy="100" r="45" fill="none" stroke="#00F0FF" stroke-width="8" stroke-dasharray="160 80" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" repeatCount="indefinite" dur="1.5s" values="0 100 100;360 100 100" />
  </circle>
  <circle cx="100" cy="100" r="30" fill="none" stroke="#9D00FF" stroke-width="6" stroke-dasharray="100 50" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" repeatCount="indefinite" dur="1s" values="360 100 100;0 100 100" />
  </circle>
  <circle cx="100" cy="100" r="10" fill="#FFFFFF">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>
